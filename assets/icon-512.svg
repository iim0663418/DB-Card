      <stop offset="0%" style="stop-color:#6868ac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4e4e81;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  
  <!-- Main Card -->
  <rect x="128" y="160" width="256" height="192" rx="16" fill="white" opacity="0.95"/>
  <rect x="144" y="176" width="224" height="160" rx="8" fill="none" stroke="#6868ac" stroke-width="4"/>
  
  <!-- NFC Symbol -->
  <circle cx="192" cy="224" r="16" fill="none" stroke="#6868ac" stroke-width="4"/>
  <circle cx="192" cy="224" r="32" fill="none" stroke="#6868ac" stroke-width="3" opacity="0.7"/>
  <circle cx="192" cy="224" r="48" fill="none" stroke="#6868ac" stroke-width="2" opacity="0.5"/>
  <circle cx="192" cy="224" r="64" fill="none" stroke="#6868ac" stroke-width="1" opacity="0.3"/>
  
  <!-- Text Lines -->
  <rect x="240" y="208" width="96" height="6" rx="3" fill="#6868ac"/>
  <rect x="240" y="224" width="80" height="6" rx="3" fill="#6868ac" opacity="0.8"/>
