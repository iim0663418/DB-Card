name = "db-card-staging"
main = "src/index.ts"
compatibility_date = "2024-04-03"  # Enable Durable Objects RPC
# Version: v5.0.1

# Environment Variables
[vars]
ENVIRONMENT = "staging"
WORKER_URL = "https://db-card-staging.csw30454.workers.dev"
GOOGLE_CLIENT_ID = "675226781448-akeqtr5d603ad0bcb3tve5hl4a8c164u.apps.googleusercontent.com"
GEMINI_MODEL = "gemini-3-flash-preview"
GEMINI_EMBEDDING_MODEL = "gemini-embedding-001"
FILE_SEARCH_STORE_NAME = "fileSearchStores/dbcard-knowledge-base-fpyodw69c4ua"

# Static Assets
[assets]
directory = "./public"
binding = "ASSETS"

# Staging D1 Database
[[d1_databases]]
binding = "DB"
database_name = "db-card-staging"
database_id = "d31b5e42-d8bf-4044-9744-4aff5669de4b"

# KV Namespace for Rate Limiting
[[kv_namespaces]]
binding = "KV"
id = "87221de061f049d3a4c976b7b5092dd9"

# Vectorize Index for Card Embeddings
[[vectorize]]
binding = "VECTORIZE"
index_name = "card-embeddings"

# Durable Objects
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDO"
script_name = "db-card-staging"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiterDO"]

# R2 Bucket for Card Images (Staging)
# Directory structure:
#   - physical/: Physical card images (existing feature)
#   - received/temp/: Temporary uploads for AI processing (1 hour TTL)
#   - received/permanent/: Saved card images
[[r2_buckets]]
binding = "PHYSICAL_CARDS"
bucket_name = "db-card-physical-images-staging"
preview_bucket_name = "db-card-physical-images-preview"

# Cron Triggers (免費版限制：單一 Cron 回退)
# Taiwan Time (UTC+8):
#   02:00 = UTC 18:00 - All Tasks (Sync + Deduplicate + AutoTag + Candidates + Cleanup)
[triggers]
crons = ["0 18 * * *"]

# Production Environment
[env.production]
name = "db-card-api-prod"
vars = { ENVIRONMENT = "production", WORKER_URL = "https://db-card.example.com", GOOGLE_CLIENT_ID = "675226781448-akeqtr5d603ad0bcb3tve5hl4a8c164u.apps.googleusercontent.com", FILE_SEARCH_STORE_NAME = "fileSearchStores/dbcard-knowledge-base-fpyodw69c4ua" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "db-card-prod"
database_id = "947e021c-2858-47b3-8495-2aaf8fa956ad"

[[env.production.kv_namespaces]]
binding = "KV"
id = "87221de061f049d3a4c976b7b5092dd9"

# Observability Configuration
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
